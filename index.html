<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Legion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Подключаем музыку напрямую со стабильного стрим-сервера (без внешних плееров) -->
    <audio id="bg-music" src="https://syntheticfm.com" loop pre-load="auto"></audio>

    <div class="main-container">
        
        <!-- ЭКРАН 1: Стартовое меню -->
        <div id="start-menu" class="menu-box">
            <p class="subtitle">[ НАЖМИТЕ ДЛЯ АКТИВАЦИИ ]</p>
            <button id="activate-btn" class="glow-button">АКТИВИРОВАТЬ</button>
        </div>

        <!-- ЭКРАН 2: Главное меню выбора -->
        <div id="buttons-menu" class="menu-box hidden">
            <p class="subtitle">[ ВЫБЕРИТЕ РАЗДЕЛ ]</p>
            <div class="button-column">
                <button id="btn-who" class="glow-button">Кто такие ELITE?</button>
                <button id="btn-rules" class="glow-button">Где взять устав и что он представляет?</button>
                <button id="btn-jobs" class="glow-button">Вакансии</button>
            </div>
        </div>

        <!-- ЭКРАН 3: Кто такие ELITE -->
        <div id="text-menu" class="menu-box hidden">
            <p class="subtitle">[ ИНФОРМАЦИЯ: КТО ТАКИЕ ELITE ]</p>
            <div id="text-who" class="info-text type-text" data-text="ELITE - Гвардия отдела Metro Police Forces и Overwatch Transhuman Arms, одно из подразделений созданное Генеральным Штабом Сити-17. В данное подразделение входят строго лучшие юниты из рядов всех Гарнизонов ГО и OTA. Подразделение имеет дополнительные корпуса: Корпус юстиции и Корпус Командования. Подразделение занимается строгим надзором за соблюдением устава среди остальных юнитов ГО, а в случае нарушения того его пресечением и вынесением приговора. Для остальных юнитов ГО те является строгим образцом и фигурой ГО на которую стоит ровняться."></div>
            <button id="btn-back-who" class="glow-button back-btn">НАЗАД</button>
        </div>

        <!-- ЭКРАН 4: Устав -->
        <div id="rules-menu" class="menu-box hidden">
            <p class="subtitle">[ ИНФОРМАЦИЯ: УСТАВ ]</p>
            <div id="text-rules" class="info-text type-text" data-text="Устав — это свод правил, который задаёт порядок работы и поведения в какой‑либо организации или структуре. В Уставе есть 8 пунктов."></div>
            <div class="link-container">
                <a href="https://docs.google.com/document/d/12YHZ9wqK59BK2zrPSvtvBxufcNWw3qUcNFpjO8pY9pU/edit?tab=t.0#heading=h.12wixb4wwso0" target="_blank" class="glow-button text-link-btn">ОТКРЫТЬ УСТАВ</a>
            </div>
            <button id="btn-back-rules" class="glow-button back-btn">НАЗАД</button>
        </div>

        <!-- ЭКРАН 5: Вакансии -->
        <div id="jobs-menu" class="menu-box hidden">
            <p class="subtitle">[ ДОСТУПНЫЕ ВАКАНСИИ ]</p>
            <div class="jobs-list">
                <div class="job-item">
                    <div id="text-job1" class="info-text type-text" data-text="1. C17.MPF.ELITE.JURY.OFC- Юнит Гражданской Обороны MPF под названием Элит либо ELITE. Занимается слежкой за соблюдением устава сотрудников Г.О . Так-же следят за порядком и дисциплиной, выявляют дефекты и отклонения."></div>
                </div>
                <div class="job-item">
                    <div id="text-job2" class="info-text type-text" data-text="2. C17.OTA.ELITE.LEGION- Экспериментальные единицы ОТА, предназначены для охраны важных лиц, предотвращения атак на город, бунтов и тому подобное"></div>
                </div>
            </div>
            <button id="btn-back-jobs" class="glow-button back-btn">НАЗАД</button>
        </div>

    </div>

    <!-- Красивая кнопка музыки СНИЗУ -->
    <button id="music-toggle-btn" class="music-fixed-btn">[ МУЗЫКА: ВКЛ ]</button>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const startMenu = document.getElementById('start-menu');
            const buttonsMenu = document.getElementById('buttons-menu');
            const textMenu = document.getElementById('text-menu');
            const rulesMenu = document.getElementById('rules-menu');
            const jobsMenu = document.getElementById('jobs-menu');

            const activateBtn = document.getElementById('activate-btn');
            const btnWho = document.getElementById('btn-who');
            const btnRules = document.getElementById('btn-rules');
            const btnJobs = document.getElementById('btn-jobs');

            const btnBackWho = document.getElementById('btn-back-who');
            const btnBackRules = document.getElementById('btn-back-rules');
            const btnBackJobs = document.getElementById('btn-back-jobs');

            const audio = document.getElementById('bg-music');
            const musicBtn = document.getElementById('music-toggle-btn');

            // Управление музыкой вручную
            musicBtn.onclick = () => {
                if (audio.paused) {
                    audio.play().catch(e => {});
                    musicBtn.innerHTML = "[ МУЗЫКА: ВКЛ ]";
                    musicBtn.classList.remove('muted');
                } else {
                    audio.pause();
                    musicBtn.innerHTML = "[ МУЗЫКА: ВЫКЛ ]";
                    musicBtn.classList.add('muted');
                }
            };

            let typingTimers = [];

            function typeWriter(elementId) {
                const element = document.getElementById(elementId);
                if (!element) return;
                
                const text = element.getAttribute('data-text');
                element.innerHTML = '';
                element.classList.add('typing-cursor');
                
                let i = 0;
                const speed = 15; 

                function type() {
                    if (i < text.length) {
                        element.innerHTML += text.charAt(i);
                        i++;
                        const timer = setTimeout(type, speed);
                        typingTimers.push(timer);
                    } else {
                        element.classList.remove('typing-cursor');
                    }
                }
                type();
            }

            function resetTyping() {
                typingTimers.forEach(timer => clearTimeout(timer));
                typingTimers = [];
                document.querySelectorAll('.type-text').forEach(el => {
                    el.innerHTML = '';
                    el.classList.remove('typing-cursor');
                });
            }

            // Кнопка активации теперь сработает БЕЗ задержек и блокировок браузера
            activateBtn.onclick = () => { 
                startMenu.classList.add('hidden'); 
                buttonsMenu.classList.remove('hidden'); 
                // Запускаем воспроизведение аудиопотока
                audio.play().catch(e => console.log("Браузер ожидал клика пользователя"));
            };
            
            btnWho.onclick = () => { buttonsMenu.classList.add('hidden'); textMenu.classList.remove('hidden'); typeWriter('text-who'); };
            btnRules.onclick = () => { buttonsMenu.classList.add('hidden'); rulesMenu.classList.remove('hidden'); typeWriter('text-rules'); };
            btnJobs.onclick = () => { buttonsMenu.classList.add('hidden'); jobsMenu.classList.remove('hidden'); typeWriter('text-job1'); typeWriter('text-job2'); };

            btnBackWho.onclick = () => { resetTyping(); textMenu.classList.add('hidden'); buttonsMenu.classList.remove('hidden'); };
            btnBackRules.onclick = () => { resetTyping(); rulesMenu.classList.add('hidden'); buttonsMenu.classList.remove('hidden'); };
            btnBackJobs.onclick = () => { resetTyping(); jobsMenu.classList.add('hidden'); buttonsMenu.classList.remove('hidden'); };
        });
    </script>
</body>
</html>
